on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Snowflake CLI
        uses: snowflakedb/snowflake-cli-action@v2.0
        with:
          use-oidc: true
          oidc-token-name: SNOWFLAKE_CONNECTIONS_DEVLOP_TOKEN

      - name: Create Snowflake connection config
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/config.toml <<EOF
          default_connection_name = "devlop"

          [connections.devlop]
          account = "$SNOWFLAKE_ACCOUNT"
          user = "$SNOWFLAKE_USER"
          authenticator = "WORKLOAD_IDENTITY"
          workload_identity_provider = "OIDC"
          database = "$SNOWFLAKE_DATABASE"
          schema = "$SNOWFLAKE_SCHEMA"
          warehouse = "$SNOWFLAKE_WAREHOUSE"
          role = "$SNOWFLAKE_ROLE"
          EOF
          chmod 0600 ~/.snowflake/config.toml

      - name: Test the Snowflake CLI connection
        run: snow connection test --connection devlop

      - name: Install dbt and run deps
        run: |
          pip install dbt-snowflake
          cd cicd_demo
          dbt deps --profiles-dir .

      - name: Create dbt profiles.yml
        run: |
          cat > ./cicd_demo/profiles.yml <<EOF
          cicd_demo:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: "$SNOWFLAKE_ACCOUNT"
                user: "$SNOWFLAKE_USER"
                authenticator: WORKLOAD_IDENTITY
                workload_identity_provider: OIDC
                role: "$SNOWFLAKE_ROLE"
                database: "$SNOWFLAKE_DATABASE"
                warehouse: "$SNOWFLAKE_WAREHOUSE"
                schema: "$SNOWFLAKE_SCHEMA"
                threads: 4
          EOF

      - name: Deploy the dbt project
        run: snow dbt deploy DEMO_DBT_PROJECT --source ./cicd_demo --force --connection devlop

      - name: List dbt projects
        run: snow dbt list --connection devlop

      - name: Execute dbt run
        run: snow dbt execute DEMO_DBT_PROJECT run --target dev --select models/staging/stg_orders.sql 

      - name: Execute dbt test
        run: snow dbt execute DEMO_DBT_PROJECT test --target dev --select models/marts/sales_summary.sql