name: Deploy dbt Project

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    env:
      SNOWFLAKE_ACCOUNT: ${{ vars.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ vars.SNOWFLAKE_USER }}
      SNOWFLAKE_DATABASE: ${{ vars.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_SCHEMA: ${{ vars.SNOWFLAKE_SCHEMA }}
      SNOWFLAKE_WAREHOUSE: ${{ vars.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_ROLE: ${{ vars.SNOWFLAKE_ROLE }}
      DBT_PROJECT_DIR: cicd_demo
      DBT_PROJECT_NAME: DEMO_DBT_PROJECT

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Snowflake CLI with GitHub OIDC
        uses: snowflakedb/snowflake-cli-action@v2
        with:
          use-oidc: true
          cli-version: '3.16'
          oidc-token-name: SNOWFLAKE_CONNECTIONS_DEVELOP_TOKEN

      - name: Create Snowflake connection config
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/config.toml <<EOF
          default_connection_name = "develop"

          [connections.develop]
          account = "$SNOWFLAKE_ACCOUNT"
          user = "$SNOWFLAKE_USER"
          authenticator = "WORKLOAD_IDENTITY"
          workload_identity_provider = "OIDC"
          database = "$SNOWFLAKE_DATABASE"
          schema = "$SNOWFLAKE_SCHEMA"
          warehouse = "$SNOWFLAKE_WAREHOUSE"
          role = "$SNOWFLAKE_ROLE"
          EOF
          chmod 0600 ~/.snowflake/config.toml

      - name: Test Snowflake OIDC connection
        run: snow connection test --connection develop

      - name: Create dbt profiles.yml
        run: |
          cat > "$DBT_PROJECT_DIR/profiles.yml" <<EOF
          cicd_demo:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: "$SNOWFLAKE_ACCOUNT"
                user: "$SNOWFLAKE_USER"
                authenticator: WORKLOAD_IDENTITY
                workload_identity_provider: OIDC
                token: "{{ env_var('SNOWFLAKE_CONNECTIONS_DEVELOP_TOKEN') }}"
                role: "$SNOWFLAKE_ROLE"
                database: "$SNOWFLAKE_DATABASE"
                warehouse: "$SNOWFLAKE_WAREHOUSE"
                schema: "$SNOWFLAKE_SCHEMA"
                threads: 4
          EOF

      - name: Install dbt and dependencies
        run: |
          pip install dbt-snowflake
          cd "$DBT_PROJECT_DIR"
          dbt deps --profiles-dir .

      - name: Deploy dbt project to Snowflake
        run: snow dbt deploy "$DBT_PROJECT_NAME" --source "./$DBT_PROJECT_DIR" --force --connection develop

      - name: List dbt projects
        run: snow dbt list --connection develop

      - name: Execute dbt staging model
        run: snow dbt execute "$DBT_PROJECT_NAME" run --target dev --select models/staging/stg_orders.sql

      - name: Execute dbt mart model
        run: snow dbt execute "$DBT_PROJECT_NAME" run --target dev --select models/marts/sales_summary.sql

      - name: Execute dbt tests
        run: snow dbt execute "$DBT_PROJECT_NAME" test --target dev --select models/staging/schema.yml
